<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waardelijsten NKR — IKNL</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:       #11B5E9;
      --cyan-light: #e8f7fd;
      --teal:       #006D8C;
      --heading:    #1a3a4a;
      --text:       #333;
      --muted:      #666;
      --border:     #dde3e7;
      --bg:         #f5f7f8;
      --white:      #fff;
      --tag-bg:     #eaf6fb;
      --font: "Avenir LT Std", "Avenir", Arial, Helvetica, sans-serif;
      --left-w:     240px;
      --detail-w:   340px;
    }

    html, body { height: 100%; }
    body {
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a { color: var(--cyan); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Top strip ── */
    .topbar { background: #005570; height: 4px; flex-shrink: 0; }

    /* ── Header ── */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      flex-shrink: 0;
    }
    .header-inner {
      max-width: 100%;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 10px;
    }
    .header-logo {
      font-weight: 900;
      font-size: 18px;
      color: var(--teal);
      text-decoration: none;
    }
    .header-sep { color: var(--border); font-size: 20px; }
    .header-back {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }
    .header-back:hover { color: var(--cyan); }
    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--heading);
      margin-left: 4px;
    }

    /* ── App shell: 3 columns ── */
    .app {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── LEFT: filters ── */
    .panel-left {
      width: var(--left-w);
      flex-shrink: 0;
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-left-head {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-left-head h2 {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* Search box */
    .search-wrap {
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 8px 10px 8px 32px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--cyan); }
    .search-wrap svg {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 15px;
      height: 15px;
    }

    /* Category filters */
    /* Tumor filter */
    .tumor-filter {
      padding: 10px 16px 6px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tumor-filter-label {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 7px;
    }
    .tumor-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .tumor-chip {
      font-size: 11.5px;
      font-family: var(--font);
      padding: 3px 9px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--muted);
      cursor: pointer;
      transition: background .1s, color .1s, border-color .1s;
    }
    .tumor-chip:hover { background: var(--cyan-light); border-color: var(--cyan); color: var(--teal); }
    .tumor-chip.active { background: var(--cyan); border-color: var(--cyan); color: var(--white); font-weight: 700; }

    .cat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .cat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 16px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      border-left: 3px solid transparent;
      transition: background .1s, border-color .1s, color .1s;
      user-select: none;
    }
    .cat-item:hover { background: var(--cyan-light); color: var(--teal); }
    .cat-item.active {
      background: var(--cyan-light);
      border-left-color: var(--cyan);
      color: var(--teal);
      font-weight: 700;
    }
    .cat-count {
      background: var(--border);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      color: var(--muted);
    }
    .cat-item.active .cat-count {
      background: var(--cyan);
      color: var(--white);
    }

    /* ── CENTER: variable list ── */
    .panel-center {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .center-head {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--white);
      flex-shrink: 0;
    }
    .center-head-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .center-head h2 {
      font-size: 15px;
      font-weight: 700;
      color: var(--heading);
    }
    .result-count {
      font-size: 12px;
      color: var(--muted);
    }

    .var-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .var-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .12s, box-shadow .12s;
    }
    .var-card:hover {
      border-color: var(--cyan);
      box-shadow: 0 2px 8px rgba(17,181,233,.12);
    }
    .var-card.selected {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(17,181,233,.2);
    }
    .var-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }
    .var-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--heading);
    }
    .var-type-badge {
      flex-shrink: 0;
      font-size: 11px;
      background: var(--tag-bg);
      color: var(--teal);
      border: 1px solid #c2e5f4;
      border-radius: 10px;
      padding: 2px 8px;
      white-space: nowrap;
    }
    .var-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 8px;
    }
    .var-card-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tumor-tag {
      font-size: 11px;
      background: #f0f4f7;
      color: var(--muted);
      border-radius: 3px;
      padding: 2px 7px;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 10px;
      padding: 40px;
      text-align: center;
    }
    .empty-state svg { opacity: .3; }
    .empty-state p { font-size: 14px; }

    /* ── RIGHT: detail panel ── */
    .panel-right {
      width: var(--detail-w);
      flex-shrink: 0;
      background: var(--white);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .detail-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 12px;
      padding: 32px;
      text-align: center;
    }
    .detail-empty svg { opacity: .25; }
    .detail-empty p { font-size: 13px; line-height: 1.5; }

    .detail-content {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .detail-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .detail-header h3 {
      font-size: 16px;
      font-weight: 900;
      color: var(--heading);
      margin-bottom: 6px;
    }
    .detail-cat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--cyan);
      font-weight: 700;
    }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    .detail-section {
      margin-bottom: 20px;
    }
    .detail-section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .detail-section p {
      font-size: 13.5px;
      color: var(--text);
      line-height: 1.5;
    }

    /* Value table */
    .value-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .value-table th {
      text-align: left;
      padding: 6px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-weight: 700;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .value-table td {
      padding: 7px 8px;
      border: 1px solid var(--border);
      vertical-align: top;
    }
    .value-table tr:nth-child(even) td { background: #fafbfc; }
    .value-code {
      font-family: "Courier New", monospace;
      color: var(--teal);
      font-weight: 700;
      white-space: nowrap;
    }

    /* Tumor tags */
    .tumor-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .tumor-tag-lg {
      font-size: 12px;
      background: var(--tag-bg);
      color: var(--teal);
      border: 1px solid #c2e5f4;
      border-radius: 3px;
      padding: 3px 9px;
    }

    /* Notes box */
    .note-box {
      background: #fffbe6;
      border-left: 3px solid #f0c040;
      border-radius: 0 4px 4px 0;
      padding: 10px 12px;
      font-size: 13px;
      color: #5a4a00;
      line-height: 1.45;
    }

    /* No-values label */
    .no-values {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .panel-right { display: none; }
    }
    @media (max-width: 600px) {
      .panel-left { display: none; }
    }
  </style>
</head>
<body>

  <div class="topbar"></div>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="header-logo">IKNL</a>
      <span class="header-sep">/</span>
      <a href="index.html" class="header-back">Gegevensaanvraag</a>
      <span class="header-sep">/</span>
      <span class="header-title">Waardelijsten NKR</span>
    </div>
  </header>

  <div class="app">

    <!-- LEFT: category filter -->
    <nav class="panel-left">
      <div class="tumor-filter">
        <div class="tumor-filter-label">Tumorsoort</div>
        <div class="tumor-chips" id="tumor-chips"></div>
      </div>
      <div class="panel-left-head">
        <h2>Categorie</h2>
        <div class="search-wrap">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
          </svg>
          <input type="text" id="search-input" placeholder="Zoek variabele..." autocomplete="off" />
        </div>
      </div>
      <div class="cat-list" id="cat-list"></div>
    </nav>

    <!-- CENTER: variable cards -->
    <main class="panel-center">
      <div class="center-head">
        <div class="center-head-row">
          <h2 id="center-title">Alle variabelen</h2>
          <span class="result-count" id="result-count"></span>
        </div>
      </div>
      <div class="var-list" id="var-list"></div>
    </main>

    <!-- RIGHT: detail panel -->
    <aside class="panel-right" id="panel-right">
      <div class="detail-empty" id="detail-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 12h6M9 16h6M9 8h3M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/>
        </svg>
        <p>Selecteer een variabele om de waardelijst en details te bekijken.</p>
      </div>
      <div class="detail-content" id="detail-content" style="display:none;"></div>
    </aside>

  </div>

  <script src="data/waardelijsten.js"></script>
  <script>
    let allVars = window.WAARDELIJSTEN || [];
    let activeCategory = null;
    let activeTumor = null;
    let selectedId = null;
    let searchQuery = '';

    renderTumorChips();
    renderCategories();
    renderList();

    // ── Tumor chips ──
    function renderTumorChips() {
      const tumors = [...new Set(allVars.flatMap(v => v.tumorsoorten))].sort();
      const container = document.getElementById('tumor-chips');
      container.innerHTML = '';
      tumors.forEach(t => {
        const chip = document.createElement('button');
        chip.className = 'tumor-chip' + (activeTumor === t ? ' active' : '');
        chip.textContent = t;
        chip.addEventListener('click', () => {
          activeTumor = activeTumor === t ? null : t;
          activeCategory = null;
          selectedId = null;
          document.getElementById('detail-empty').style.display = 'flex';
          document.getElementById('detail-content').style.display = 'none';
          renderTumorChips();
          renderCategories();
          renderList();
        });
        container.appendChild(chip);
      });
    }

    // ── Category sidebar ──
    function getCategories() {
      const map = {};
      getFilteredByTumor().forEach(v => {
        map[v.categorie] = (map[v.categorie] || 0) + 1;
      });
      return map;
    }

    function getFilteredByTumor() {
      if (!activeTumor) return allVars;
      return allVars.filter(v => v.tumorsoorten.includes(activeTumor));
    }

    function renderCategories() {
      const cats = getCategories();
      const total = allVars.length;
      const container = document.getElementById('cat-list');
      container.innerHTML = '';

      // "All" option
      const all = document.createElement('div');
      all.className = 'cat-item' + (activeCategory === null ? ' active' : '');
      all.innerHTML = `<span>Alle categorieën</span><span class="cat-count">${total}</span>`;
      all.addEventListener('click', () => { activeCategory = null; renderCategories(); renderList(); });
      container.appendChild(all);

      Object.entries(cats).forEach(([cat, count]) => {
        const el = document.createElement('div');
        el.className = 'cat-item' + (activeCategory === cat ? ' active' : '');
        el.innerHTML = `<span>${cat}</span><span class="cat-count">${count}</span>`;
        el.addEventListener('click', () => { activeCategory = cat; renderCategories(); renderList(); });
        container.appendChild(el);
      });
    }

    // ── Filter logic ──
    function getFiltered() {
      return getFilteredByTumor().filter(v => {
        const matchCat = !activeCategory || v.categorie === activeCategory;
        if (!matchCat) return false;
        if (!searchQuery) return true;
        const q = searchQuery.toLowerCase();
        return (
          v.naam.toLowerCase().includes(q) ||
          v.beschrijving.toLowerCase().includes(q) ||
          v.categorie.toLowerCase().includes(q) ||
          v.waarden.some(w => w.label.toLowerCase().includes(q) || w.code.toLowerCase().includes(q)) ||
          v.tumorsoorten.some(t => t.toLowerCase().includes(q))
        );
      });
    }

    // ── Variable list ──
    function renderList() {
      const filtered = getFiltered();
      const container = document.getElementById('var-list');
      const title = document.getElementById('center-title');
      const count = document.getElementById('result-count');

      title.textContent = activeCategory || 'Alle variabelen';
      count.textContent = `${filtered.length} variabele${filtered.length !== 1 ? 'n' : ''}`;

      container.innerHTML = '';

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
            <p>Geen variabelen gevonden voor "<strong>${searchQuery}</strong>".<br>Probeer een andere zoekterm.</p>
          </div>`;
        return;
      }

      filtered.forEach(v => {
        const card = document.createElement('div');
        card.className = 'var-card' + (v.id === selectedId ? ' selected' : '');
        card.dataset.id = v.id;

        const tumors = v.tumorsoorten.slice(0, 3)
          .map(t => `<span class="tumor-tag">${t}</span>`).join('');
        const more = v.tumorsoorten.length > 3
          ? `<span class="tumor-tag">+${v.tumorsoorten.length - 3}</span>` : '';

        card.innerHTML = `
          <div class="var-card-top">
            <div class="var-name">${highlight(v.naam)}</div>
            <span class="var-type-badge">${v.type.split(' ')[0]}</span>
          </div>
          <div class="var-desc">${highlight(v.beschrijving)}</div>
          <div class="var-card-footer">${tumors}${more}</div>`;

        card.addEventListener('click', () => selectVar(v.id));
        container.appendChild(card);
      });
    }

    // ── Highlight search term ──
    function highlight(text) {
      if (!searchQuery) return text;
      const re = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(re, '<mark style="background:#fff3a0;border-radius:2px;">$1</mark>');
    }

    // ── Detail panel ──
    function selectVar(id) {
      selectedId = id;
      renderList(); // re-render to update selected state

      const v = allVars.find(x => x.id === id);
      if (!v) return;

      document.getElementById('detail-empty').style.display = 'none';
      const dc = document.getElementById('detail-content');
      dc.style.display = 'flex';

      // Build values table or placeholder
      let valuesHTML;
      if (v.waarden.length === 0) {
        valuesHTML = `<p class="no-values">Geen vaste waardelijst — dit is een ${v.type.toLowerCase()} veld.</p>`;
      } else {
        const rows = v.waarden.map(w => `
          <tr>
            <td class="value-code">${w.code}</td>
            <td>${w.label}</td>
          </tr>`).join('');
        valuesHTML = `
          <table class="value-table">
            <thead><tr><th>Code</th><th>Label</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>`;
      }

      // Build tumor tags
      const tumorTags = (v.tumorsoorten || [])
        .map(t => `<span class="tumor-tag-lg">${t}</span>`).join('');

      dc.innerHTML = `
        <div class="detail-header">
          <div class="detail-cat-label">${v.categorie}</div>
          <h3>${v.naam}</h3>
        </div>
        <div class="detail-body">
          <div class="detail-section">
            <div class="detail-section-label">Beschrijving</div>
            <p>${v.beschrijving}</p>
          </div>

          <div class="detail-section">
            <div class="detail-section-label">Type</div>
            <p>${v.type}</p>
          </div>

          <div class="detail-section">
            <div class="detail-section-label">Tumorsoorten</div>
            <div class="tumor-tags">${tumorTags}</div>
          </div>

          <div class="detail-section">
            <div class="detail-section-label">Waarden</div>
            ${valuesHTML}
          </div>

          ${v.notities ? `
          <div class="detail-section">
            <div class="detail-section-label">Notities</div>
            <div class="note-box">${v.notities}</div>
          </div>` : ''}
        </div>`;
    }

    // ── Search input ──
    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      selectedId = null;
      document.getElementById('detail-empty').style.display = 'flex';
      document.getElementById('detail-content').style.display = 'none';
      renderList();
    });
  </script>

</body>
</html>
